user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format invubi 'timestamp=$time_iso8601 method=$request_method '
                      'path="$uri" status=$status '
                      'response_bytes=$body_bytes_sent request_time=$request_time '
                      'upstream_status=$upstream_status upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log invubi;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
