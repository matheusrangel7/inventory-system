server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    charset_types
        text/html
        text/css
        text/plain
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 ipv6=off valid=30s;

    location ^~ /api/ {
        set $backend_upstream backend:5000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }

    location ^~ /assets/ {
        try_files $uri =404;
    }

    location ^~ /css/ {
        try_files $uri =404;
    }

    location ^~ /js/ {
        try_files $uri =404;
    }

    location = /pages/auth/login.html {
        return 301 /login$is_args$args;
    }

    location = /pages/auth/firstlogin.html {
        return 301 /primeiro-acesso$is_args$args;
    }

    location = /pages/auth/enroll-mfa.html {
        return 301 /configurar-mfa$is_args$args;
    }

    location = /pages/dashboard/admin/dashboard.html {
        return 301 /painel/admin$is_args$args;
    }

    location = /pages/dashboard/user/dashboard.html {
        return 301 /painel/gestor$is_args$args;
    }

    location ^~ /pages/ {
        return 404;
    }

    location ~ /(?:\.git|\.env|Dockerfile|docker-compose\.ya?ml|package(?:-lock)?\.json|tailwind\.config\.js|README\.md)$ {
        return 404;
    }

    location ~ ^/(.+)\.html$ {
        return 301 /$1$is_args$args;
    }

    location = / {
        return 302 /login;
    }

    location = /login {
        default_type text/html;
        try_files /pages/auth/login.html =404;
    }

    location = /login/ {
        return 301 /login$is_args$args;
    }

    location = /primeiro-acesso {
        default_type text/html;
        try_files /pages/auth/firstlogin.html =404;
    }

    location = /primeiro-acesso/ {
        return 301 /primeiro-acesso$is_args$args;
    }

    location = /configurar-mfa {
        default_type text/html;
        try_files /pages/auth/enroll-mfa.html =404;
    }

    location = /configurar-mfa/ {
        return 301 /configurar-mfa$is_args$args;
    }

    location = /painel/admin {
        default_type text/html;
        try_files /pages/dashboard/admin/dashboard.html =404;
    }

    location = /painel/admin/ {
        return 301 /painel/admin$is_args$args;
    }

    location = /painel/gestor {
        default_type text/html;
        try_files /pages/dashboard/user/dashboard.html =404;
    }

    location = /painel/gestor/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /autenticacao/login {
        return 301 /login$is_args$args;
    }

    location = /autenticacao/primeiro-acesso {
        return 301 /primeiro-acesso$is_args$args;
    }

    location = /autenticacao/firstlogin {
        return 301 /primeiro-acesso$is_args$args;
    }

    location = /completar-registo {
        return 301 /primeiro-acesso$is_args$args;
    }

    location = /autenticacao/configurar-mfa {
        return 301 /configurar-mfa$is_args$args;
    }

    location = /mfa {
        return 301 /configurar-mfa$is_args$args;
    }

    location = /enroll-mfa {
        return 301 /configurar-mfa$is_args$args;
    }

    # Antigos caminhos do admin.
    location = /admin {
        return 301 /painel/admin$is_args$args;
    }

    location = /admin/ {
        return 301 /painel/admin$is_args$args;
    }

    location = /dashboard/admin {
        return 301 /painel/admin$is_args$args;
    }

    location = /dashboard/admin/ {
        return 301 /painel/admin$is_args$args;
    }

    location = /painel/admin/dashboard {
        return 301 /painel/admin$is_args$args;
    }

    location = /utilizador {
        return 301 /painel/gestor$is_args$args;
    }

    location = /utilizador/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /gestor {
        return 301 /painel/gestor$is_args$args;
    }

    location = /gestor/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /dashboard/utilizador {
        return 301 /painel/gestor$is_args$args;
    }

    location = /dashboard/utilizador/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /dashboard/gestor {
        return 301 /painel/gestor$is_args$args;
    }

    location = /dashboard/gestor/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /painel/utilizador {
        return 301 /painel/gestor$is_args$args;
    }

    location = /painel/utilizador/ {
        return 301 /painel/gestor$is_args$args;
    }

    location = /painel/utilizador/dashboard {
        return 301 /painel/gestor$is_args$args;
    }

    location = /painel/user/dashboard {
        return 301 /painel/gestor$is_args$args;
    }

    location / {
        return 404;
    }
}