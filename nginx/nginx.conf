server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name localhost 127.0.0.1 _;

    ssl_certificate /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    charset_types
        text/html
        text/css
        text/plain
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Cabeçalhos de Cache e Segurança
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    add_header Strict-Transport-Security "max-age=31536000" always; # Faltava este!
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 ipv6=off valid=30s;

    # Proxy para o Backend
    location ^~ /api/ {
        set $backend_upstream backend:5000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }

    # Estáticos
    location ^~ /assets/ { try_files $uri =404; }
    location ^~ /css/ { try_files $uri =404; }
    location ^~ /js/ { try_files $uri =404; }

    # Impedir acesso direto aos ficheiros .html (Forçar URL limpa)
    location = /pages/auth/login.html { return 301 /login$is_args$args; }
    location = /pages/auth/firstlogin.html { return 301 /primeiro-acesso$is_args$args; }
    location = /pages/auth/enroll-mfa.html { return 301 /configurar-mfa$is_args$args; }
    location = /pages/dashboard/admin/dashboard.html { return 301 /painel/admin$is_args$args; }
    location = /pages/dashboard/user/dashboard.html { return 301 /painel/gestor$is_args$args; }

    location ^~ /pages/ { return 404; }

    # Bloquear ficheiros sensíveis do sistema
    location ~ /(?:\.git|\.env|Dockerfile|docker-compose\.ya?ml|package(?:-lock)?\.json|tailwind\.config\.js|README\.md)$ {
        return 404;
    }

    location ~ ^/(.+)\.html$ {
        return 301 /$1$is_args$args;
    }

    location = / {
        return 302 /login;
    }

    # --- URLs Limpas Corrigidas com ALIAS (Evita o Loop Infinito) ---
    location = /login {
        default_type text/html;
        alias /usr/share/nginx/html/pages/auth/login.html;
    }
    location = /login/ { return 301 /login$is_args$args; }

    location = /primeiro-acesso {
        default_type text/html;
        alias /usr/share/nginx/html/pages/auth/firstlogin.html;
    }
    location = /primeiro-acesso/ { return 301 /primeiro-acesso$is_args$args; }

    location = /configurar-mfa {
        default_type text/html;
        alias /usr/share/nginx/html/pages/auth/enroll-mfa.html;
    }
    location = /configurar-mfa/ { return 301 /configurar-mfa$is_args$args; }

    location = /painel/admin {
        default_type text/html;
        alias /usr/share/nginx/html/pages/dashboard/admin/dashboard.html;
    }
    location = /painel/admin/ { return 301 /painel/admin$is_args$args; }

    location = /painel/gestor {
        default_type text/html;
        alias /usr/share/nginx/html/pages/dashboard/user/dashboard.html;
    }
    location = /painel/gestor/ { return 301 /painel/gestor$is_args$args; }

    # --- Redirecionamentos de Legado/Compatibilidade (Mantidos todos os teus) ---
    location = /autenticacao/login { return 301 /login$is_args$args; }
    location = /autenticacao/primeiro-acesso { return 301 /primeiro-acesso$is_args$args; }
    location = /autenticacao/firstlogin { return 301 /primeiro-acesso$is_args$args; }
    location = /completar-registo { return 301 /primeiro-acesso$is_args$args; }
    location = /autenticacao/configurar-mfa { return 301 /configurar-mfa$is_args$args; }
    location = /mfa { return 301 /configurar-mfa$is_args$args; }
    location = /enroll-mfa { return 301 /configurar-mfa$is_args$args; }
    location = /admin { return 301 /painel/admin$is_args$args; }
    location = /admin/ { return 301 /painel/admin$is_args$args; }
    location = /dashboard/admin { return 301 /painel/admin$is_args$args; }
    location = /dashboard/admin/ { return 301 /painel/admin$is_args$args; }
    location = /painel/admin/dashboard { return 301 /painel/admin$is_args$args; }
    location = /utilizador { return 301 /painel/gestor$is_args$args; }
    location = /utilizador/ { return 301 /painel/gestor$is_args$args; }
    location = /gestor { return 301 /painel/gestor$is_args$args; }
    location = /gestor/ { return 301 /painel/gestor$is_args$args; }
    location = /dashboard/utilizador { return 301 /painel/gestor$is_args$args; }
    location = /dashboard/utilizador/ { return 301 /painel/gestor$is_args$args; }
    location = /dashboard/gestor { return 301 /painel/gestor$is_args$args; }
    location = /dashboard/gestor/ { return 301 /painel/gestor$is_args$args; }
    location = /painel/utilizador { return 301 /painel/gestor$is_args$args; }
    location = /painel/utilizador/ { return 301 /painel/gestor$is_args$args; }
    location = /painel/utilizador/dashboard { return 301 /painel/gestor$is_args$args; }
    location = /painel/user/dashboard { return 301 /painel/gestor$is_args$args; }

    location / {
        return 404;
    }
}