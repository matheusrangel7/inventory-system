<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>InvUBI - Login</title>
  <link rel="stylesheet" href="../../css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">

  <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
    <div class="flex gap-1">
      <img src="../../assets/ubi-logo-dark.png" class="w-12 h-12 object-contain" alt="Logo UBI">
    </div>
    <span class="text-4xl font-extrabold tracking-wider" style="color: #002566;">InvUBI</span>
  </header>

  <main
    class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">

    <div id="loginHeader" class="flex flex-col items-center mb-6">
      <div
        class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mb-3 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          style="color: #002566;" class="size-10">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
      <h2 class="text-2xl font-black tracking-tight" style="color: #002566;">Log In</h2>
      <p class="text-xs text-slate-500 mt-1">Introduza os seus dados para aceder à plataforma</p>
    </div>

    <p id="registerSuccess"
      class="hidden text-green-700 text-sm text-center font-semibold bg-green-50 border border-green-200 py-2 rounded-xl mb-4">
      Registo concluído. Faça login e configure a autenticação de dois fatores.
    </p>

    <form id="loginForm" class="space-y-5" novalidate>

      <p id="globalError"
        class="hidden text-red-600 text-sm text-center font-semibold bg-red-50 border border-red-200 py-2 rounded-xl">
        E-mail ou palavra-passe incorretos.
      </p>

      <div>
        <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
          Utilizador
        </label>
        <input type="email" id="email" placeholder="Insira o seu e-mail" autocomplete="username"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <div>
        <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
          Palavra-passe
        </label>
        <input type="password" id="password" placeholder="Insira a sua palavra-passe" autocomplete="current-password"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 active:scale-[0.99] transition-all duration-150 shadow-md shadow-blue-900/10 mt-2 flex items-center justify-center gap-3 disabled:bg-blue-900/50 disabled:opacity-80 disabled:cursor-not-allowed">

        <svg id="btnSpinner" class="h-5 w-5 text-amber-400 hidden" style="animation: spin 1s linear infinite;"
          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <style>
            @keyframes spin {
              to { transform: rotate(360deg); }
            }
          </style>
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>

        <span id="btnText">Entrar</span>
      </button>
    </form>

    <div id="mfaSection" class="hidden space-y-5">
      <p class="text-sm text-slate-600 text-center">
        Introduza o código da aplicação autenticadora (6 dígitos).
      </p>
      <p id="mfaError"
        class="hidden text-red-600 text-sm text-center font-semibold bg-red-50 border border-red-200 py-2 rounded-xl">
      </p>
      <input type="text" id="mfaCode" inputmode="numeric" pattern="[0-9]*" maxlength="6"
        autocomplete="one-time-code" placeholder="000000"
        class="w-full px-4 py-3 border border-slate-300 rounded-xl text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900" />
      <button type="button" id="mfaSubmitBtn"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800">
        Verificar código
      </button>
      <button type="button" id="mfaBackBtn" class="w-full text-slate-600 text-sm underline">
        Voltar ao login
      </button>
    </div>
  </main>

  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/login.js"></script>
</body>

</html>
