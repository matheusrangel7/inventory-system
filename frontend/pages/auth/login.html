<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvUBI - Login</title>
  <link rel="stylesheet" href="../../css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">

  <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
    <div class="flex gap-1">
      <img src="../../assets/ubi-logo-dark.png" class="w-12 h-12 object-contain" alt="Logo UBI">
    </div>
    <span class="text-4xl font-extrabold tracking-wider" style="color: #002566;">InvUBI</span>
  </header>

  <main
    class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">

    <div class="flex flex-col items-center mb-6">
      <div
        class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mb-3 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="color: #002566;"
          class="size-10">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>

        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h2 class="text-2xl font-black tracking-tight" style="color: #002566;">Log In</h2>
      <p class="text-xs text-slate-500 mt-1">Introduza os seus dados para aceder à plataforma</p>
    </div>

    <form id="loginForm" class="space-y-5" novalidate>

      <p id="globalError"
        class="text-red-600 text-sm text-center font-semibold bg-red-50 border border-red-200 py-2 rounded-xl hidden">
        E-mail ou palavra-passe incorretos.
      </p>

      <div>
        <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
          Utilizador
        </label>
        <input type="email" id="email" placeholder="Insira o seu e-mail"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest">
            Palavra-passe
          </label>
        </div>
        <input type="password" id="password" placeholder="Insira a sua palavra-passe"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 active:scale-[0.99] transition-all duration-150 shadow-md shadow-blue-900/10 mt-2 flex items-center justify-center gap-3 disabled:bg-blue-900/50 disabled:opacity-80 disabled:cursor-not-allowed">

        <svg id="btnSpinner" class="h-5 w-5 text-amber-400 hidden" style="animation: spin 1s linear infinite;"
          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <style>
            @keyframes spin {
              to {
                transform: rotate(360deg);
              }
            }
          </style>
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>

        <span id="btnText">Entrar</span>
      </button>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const globalError = document.getElementById('globalError');

    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = document.getElementById('btnText');

    function applyErrorState() {
      globalError.classList.remove('hidden');

      [email, password].forEach(input => {
        input.classList.add('border-red-500', 'focus:ring-red-900/20', 'focus:border-red-500');
        input.classList.remove('border-slate-300', 'focus:ring-blue-900/20', 'focus:border-blue-900');
        input.value = '';
      });
    }

    function clearErrorState() {
      globalError.classList.add('hidden');

      [email, password].forEach(input => {
        input.classList.remove('border-red-500', 'focus:ring-red-900/20', 'focus:border-red-500');
        input.classList.add('border-slate-300', 'focus:ring-blue-900/20', 'focus:border-blue-900');
      });
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        btnSpinner.classList.remove('hidden');
        btnText.innerText = "A carregar...";
      } else {
        submitBtn.disabled = false;
        btnSpinner.classList.add('hidden');
        btnText.innerText = "Entrar";
      }
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const emailValue = email.value.trim();
      const passwordValue = password.value.trim();

      if (!emailValue || !passwordValue) {
        applyErrorState();
      } else {
        clearErrorState();

        setLoading(true);

        console.log("A validar dados...", { email: emailValue, password: passwordValue });

        // validation logic (API call)
      }
    });

    email.addEventListener("input", clearErrorState);
    password.addEventListener("input", clearErrorState);
  </script>
</body>

</html>
