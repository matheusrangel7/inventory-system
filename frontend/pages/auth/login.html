<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvUBI - Login</title>
  <link rel="stylesheet" href="../../css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">

  <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
    <div class="flex gap-1">
      <img src="../../assets/ubi-logo-dark.png" class="w-12 h-12 object-contain">
    </div>
    <span class="text-4xl font-extrabold tracking-wider" style="color: #002566;">InvUBI</span>
  </header>

  <main
    class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">

    <div class="flex flex-col items-center mb-8">
      <div
        class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mb-3 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" style="color: #002566;" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h2 class="text-2xl font-black tracking-tight" style="color: #002566;">Log In</h2>
      <p class="text-xs text-slate-500 mt-1">Introduza os seus dados para aceder à plataforma</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
          Utilizador
        </label>
        <input type="email" id="email" placeholder="Insira o seu e-mail" required
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest">
            Palavra-passe
          </label>
        </div>
        <input type="password" id="password" placeholder="Insira a sua palavra-passe" required
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
      </div>

      <button type="submit"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 active:scale-[0.99] transition-all duration-150 shadow-md shadow-blue-900/10 mt-2">
        Entrar
      </button>
    </form>
  </main>

</body>

</html>
