<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Inventory System</title>
    <link rel="stylesheet" href="../../css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container">
        <div class="row vh-100 align-items-center justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow border-0 p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h1 class="h3 fw-bold text-dark">Criar Conta</h1>
                            <p class="text-muted">Preencha o formulário para se registar</p>
                        </div>

                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nome de Utilizador</label>
                                <input type="text" id="username" class="form-control form-control-lg"
                                    placeholder="Insira o seu nome">
                                <div class="invalid-feedback">O campo nome de utilizador não pode estar vazio.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Palavra-passe</label>
                                <input type="password" id="password" class="form-control form-control-lg"
                                    placeholder="Insira a palavra-passe">
                                <div class="invalid-feedback">A palavra-passe deve ter pelo menos 8 caracteres incluindo
                                    (a-z || A-Z || 0-9 || #,@,$).</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Confirmar Palavra-passe</label>
                                <input type="password" id="confirmpassword" class="form-control form-control-lg"
                                    placeholder="Confirme a palavra-passe">
                                <div class="invalid-feedback">As palavras-passe não coincidem.</div>
                            </div>

                            <button type="submit" id="btnRegister" class="btn btn-success w-100 fw-bold py-2 shadow-sm"
                                disabled>
                                Criar Conta
                            </button>
                        </form>

                        <div class="mt-4 text-center border-top pt-3">
                            <p class="small text-muted mb-0">
                                Já possui uma conta?
                                <a href="login.html" class="text-success fw-bold text-decoration-none">Fazer Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const inputUsername = document.querySelector('#username');
        const inputPass = document.querySelector('#password');
        const inputConfirm = document.querySelector('#confirmpassword');
        const btnRegister = document.querySelector('#btnRegister');

        function validForm() {

            const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;

            const isUserValid = inputUsername.value.trim().length > 0;
            const isPassValid = passRegex.test(inputPass.value)
            const isConfirmValid = inputConfirm.value === inputPass.value && inputConfirm.value.length > 0;

            if (isUserValid) {
                inputUsername.classList.remove('is-invalid');
            } else {
                inputUsername.classList.add('is-invalid');
            }

            if (isPassValid) {
                inputPass.classList.remove('is-invalid');
            } else {
                inputPass.classList.add('is-invalid');
            }

            if (isConfirmValid) {
                inputConfirm.classList.remove('is-invalid');
            } else {
                inputConfirm.classList.add('is-invalid');
            }

            btnRegister.disabled = !(isUserValid && isPassValid && isConfirmValid);
        }

        inputUsername.addEventListener('input', validForm);
        inputPass.addEventListener('input', validForm);
        inputConfirm.addEventListener('input', validForm);

        validForm();
    </script>
</body>

</html>
