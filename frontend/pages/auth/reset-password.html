<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>InvUBI - Definir nova palavra-passe</title>
  <link rel="stylesheet" href="/css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">
  <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
    <img src="/assets/ubi-logo-dark.png" class="w-12 h-12 object-contain" alt="Logo UBI">
    <span class="text-4xl font-extrabold tracking-wider text-blue-900">InvUBI</span>
  </header>

  <main class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">
    <div class="flex flex-col items-center mb-7">
      <h1 class="text-2xl font-black tracking-tight text-center text-blue-900">Definir nova palavra-passe</h1>
      <p class="text-sm text-slate-500 mt-2 text-center">
        Utilize pelo menos 8 caracteres, incluindo uma letra e um número.
      </p>
    </div>

    <p id="feedback" class="hidden text-sm text-center font-semibold border py-3 px-4 rounded-xl mb-4"></p>

    <form id="resetPasswordForm" class="space-y-5 hidden" novalidate>
      <div>
        <label for="password" class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">Nova palavra-passe</label>
        <input type="password" id="password" autocomplete="new-password" required
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900" />
      </div>
      <div>
        <label for="confirmPassword" class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">Confirmar palavra-passe</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" required
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900" />
      </div>
      <button type="submit" id="submitBtn"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed">
        Redefinir palavra-passe
      </button>
    </form>

    <a id="loginLink" href="/login" class="hidden mt-5 text-center text-sm font-semibold text-blue-900 hover:underline">
      Voltar ao login
    </a>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/reset-password.js"></script>
</body>

</html>
