<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvUBI - Primeira Autenticação</title>
    <link rel="stylesheet" href="../../css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">

    <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
        <div class="flex gap-1">
            <img src="../../assets/ubi-logo-dark.png" class="w-12 h-12 object-contain" alt="Logo UBI">
        </div>
        <span class="text-4xl font-extrabold tracking-wider" style="color: #002566;">InvUBI</span>
    </header>

    <main
        class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">

        <div class="flex flex-col items-center mb-8">
            <div
                class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mb-3 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-black tracking-tight text-center" style="color: #002566;">Concluir Registo</h2>
            <p class="text-xs text-slate-500 mt-1 text-center">Introduza os seus dados para concluir o registo na
                plataforma</p>
        </div>

        <form id="firstAuthForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
                    Palavra-passe
                </label>
                <input type="password" id="password" placeholder="Insira a sua palavra-passe" required
                    class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
            </div>

            <div>
                <label class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">
                    Confirmar Palavra-passe
                </label>
                <input type="password" id="confirmPassword" placeholder="Confirmar palavra-passe" required
                    class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all duration-200" />
            </div>

            <button type="submit"
                class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 active:scale-[0.99] transition-all duration-150 shadow-md shadow-blue-900/10 mt-2">
                Concluir Registo
            </button>
        </form>
    </main>

</body>

</html>
