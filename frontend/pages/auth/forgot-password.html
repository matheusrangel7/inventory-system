<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>InvUBI - Recuperar palavra-passe</title>
  <link rel="stylesheet" href="/css/tailwind.css">
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6 relative">
  <header class="fixed top-6 left-6 flex items-center gap-3 select-none z-50">
    <img src="/assets/ubi-logo-dark.png" class="w-12 h-12 object-contain" alt="Logo UBI">
    <span class="text-4xl font-extrabold tracking-wider text-blue-900">InvUBI</span>
  </header>

  <main class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl shadow-slate-300/40 z-10">
    <div class="flex flex-col items-center mb-7">
      <div class="w-16 h-16 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mb-3 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7"
          stroke="currentColor" class="size-8 text-blue-900">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
      </div>
      <h1 class="text-2xl font-black tracking-tight text-center text-blue-900">Recuperar palavra-passe</h1>
      <p class="text-sm text-slate-500 mt-2 text-center">
        Introduza o email da conta para receber as instruções de recuperação.
      </p>
    </div>

    <p id="feedback" class="hidden text-sm text-center font-semibold border py-3 px-4 rounded-xl mb-4"></p>

    <form id="forgotPasswordForm" class="space-y-5" novalidate>
      <div>
        <label for="email" class="block text-xs font-bold mb-2 text-slate-700 uppercase tracking-widest">Email</label>
        <input type="email" id="email" autocomplete="email" required placeholder="nome@ubi.pt"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900" />
      </div>
      <button type="submit" id="submitBtn"
        class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed">
        Enviar instruções
      </button>
    </form>

    <a href="/login" class="block mt-5 text-center text-sm font-semibold text-slate-600 hover:text-blue-900 hover:underline">
      Voltar ao login
    </a>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>

</html>
